name: Build & Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/pascalmtk/bluesky-transactions:latest
          labels: |
            org.opencontainers.image.source=https://github.com/PascalMTK/BlueSky-Transactions-System
            org.opencontainers.image.visibility=public

      - name: Summary
        run: echo "✅ Image ready at ghcr.io/pascalmtk/bluesky-transactions:latest"
